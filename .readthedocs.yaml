# Configuration pour Read the Docs
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

# On lui indique qu'on utilise MkDocs et notre fichier mkdocs.yml
mkdocs:
  configuration: mkdocs.yml

# On installe le thème material pour qu'il puisse compiler proprement
python:
  install:
    - requirements: docs/requirements.txt
